<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 600px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #222;
    border-right: 1px solid #222;
  }

  .header {
    padding: 16px 20px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #111;
  }

  .dot {
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header h1 { font-size: 14px; color: #00ff88; letter-spacing: 2px; }
  .online-count { margin-left: auto; font-size: 11px; color: #555; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: #222 transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.mine { align-items: flex-end; }
  .msg.other { align-items: flex-start; }

  .msg-meta { font-size: 10px; color: #444; }
  .msg.mine .msg-meta { color: #00ff8855; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    max-width: 80%;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg.other .msg-bubble {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #ccc;
    border-bottom-left-radius: 4px;
  }

  .msg.mine .msg-bubble {
    background: #00ff8820;
    border: 1px solid #00ff8840;
    color: #00ff88;
    border-bottom-right-radius: 4px;
  }

  .system-msg {
    text-align: center;
    font-size: 11px;
    color: #333;
    padding: 4px 0;
  }

  .input-area {
    padding: 16px 20px;
    border-top: 1px solid #1e1e1e;
    background: #111;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #nameInput {
    width: 100px;
    padding: 10px 12px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #00ff88;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #msgInput:focus { border-color: #00ff8840; }

  #sendBtn {
    padding: 10px 18px;
    background: #00ff8815;
    border: 1px solid #00ff8840;
    border-radius: 8px;
    color: #00ff88;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #sendBtn:hover { background: #00ff8830; }
</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="header">
    <div class="dot"></div>
    <h1>LIVE CHAT</h1>
    <span class="online-count" id="onlineCount">connecting...</span>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <input type="text" id="nameInput" placeholder="name" maxlength="12">
    <input type="text" id="msgInput" placeholder="message..." maxlength="200">
    <button id="sendBtn">SEND</button>
  </div>
</div>

<script>
  const socket = io();
  const messagesDiv = document.getElementById('messages');
  const msgInput = document.getElementById('msgInput');
  const nameInput = document.getElementById('nameInput');

  // Load saved name
  nameInput.value = localStorage.getItem('chatName') || '';

  function addMessage(data, isMine = false) {
    const div = document.createElement('div');
    div.className = `msg ${isMine ? 'mine' : 'other'}`;
    div.innerHTML = `
      <div class="msg-meta">${data.name} · ${data.time}</div>
      <div class="msg-bubble">${escapeHtml(data.message)}</div>
    `;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addSystem(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  socket.on('load_history', (msgs) => {
    addSystem('— chat history —');
    msgs.forEach(m => addMessage(m, m.name === nameInput.value));
    if (msgs.length === 0) addSystem('no messages yet. say hi!');
  });

  socket.on('receive_message', (data) => {
    addMessage(data, data.name === nameInput.value);
  });

  socket.on('user_count', (count) => {
    document.getElementById('onlineCount').textContent = `${count} online`;
  });

  function sendMessage() {
    const msg = msgInput.value.trim();
    const name = nameInput.value.trim() || 'anon';
    if (!msg) return;

    localStorage.setItem('chatName', name);

    const now = new Date();
    const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    socket.emit('send_message', { name, message: msg, time });
    msgInput.value = '';
  }

  document.getElementById('sendBtn').onclick = sendMessage;
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
